<div class="std-container">
  <div class="std-customer-container">
    <section class="std-customer-top">
      <div class="std-customer-top-content">
        <div class="std-customer-top-logo-content">
          <div class="std-customer-top-logo">
            <std-svg routerLink="/" path="/images/logo.svg"></std-svg>
          </div>
        </div>
        <div class="std-customer-information">
          <p class="std-customer-step-title">
            Quelques informations
          </p>
          <std-stepper-count-tracker [initialValue]="1" [totalSteps]="7"></std-stepper-count-tracker>
        </div>
      </div>
      <div class="std-customer-top-stepper">
        <std-stepper [initialStep]="1" [totalSteps]="7"></std-stepper>
      </div>
    </section>
    <section class="std-customer-bottom">
      <div class="std-customer-bottom-content">
        <std-school-information></std-school-information>
      </div>
    </section>
  </div>
</div>
